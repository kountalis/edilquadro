    <!-- Google Consent Mode v2 - CRITICAL: Must be BEFORE gtag.js -->
    <script>
      (function() {
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag; // Expose gtag globally
        
        // Set default consent state (most restrictive)
        gtag('consent', 'default', {
          'ad_storage': 'denied',
          'analytics_storage': 'denied',
          'ad_user_data': 'denied',
          'ad_personalization': 'denied',
          'wait_for_update': 500,
          'region': ['IT']
        });
        
        // Check localStorage for saved consent
        try {
          var savedConsent = localStorage.getItem('edilquadro_consent_status');
          if (savedConsent === 'accepted') {
            gtag('consent', 'update', {
              'ad_storage': 'granted',
              'analytics_storage': 'granted',
              'ad_user_data': 'granted',
              'ad_personalization': 'granted'
            });
            console.log('✅ Consent loaded from storage: ACCEPTED');
          } else if (savedConsent === 'denied') {
            console.log('❌ Consent loaded from storage: DENIED');
          } else {
            console.log('⏳ No consent saved - waiting for user choice');
          }
        } catch(e) {
          console.warn('Could not read localStorage:', e);
        }
        
        // Listen for consent updates from React component
        window.addEventListener('consent-updated', function(e) {
          console.log('🔄 Consent event received:', e.detail.status);
          gtag('consent', 'update', {
            'ad_storage': e.detail.status === 'accepted' ? 'granted' : 'denied',
            'analytics_storage': e.detail.status === 'accepted' ? 'granted' : 'denied',
            'ad_user_data': e.detail.status === 'accepted' ? 'granted' : 'denied',
            'ad_personalization': e.detail.status === 'accepted' ? 'granted' : 'denied'
          });
        });
      })();
    </script>
