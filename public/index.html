    <!-- CRITICAL: Google Consent Mode v2 - MUST be BEFORE ANY Google script -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      
      // Set consent to DENIED by default - blocks ALL tracking until user consents
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'analytics_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'wait_for_update': 1000,  // Wait up to 1 second for consent decision
        'region': ['IT']
      });
      
      console.log('[CONSENT] Default: ALL DENIED - waiting for user choice');
      
      // Check for previously saved consent
      try {
        var consent = localStorage.getItem('edilquadro_consent_status');
        if (consent === 'accepted') {
          gtag('consent', 'update', {
            'ad_storage': 'granted',
            'analytics_storage': 'granted',
            'ad_user_data': 'granted',
            'ad_personalization': 'granted'
          });
          console.log('[CONSENT] Loaded: ACCEPTED');
        } else if (consent === 'denied') {
          console.log('[CONSENT] Loaded: DENIED');
        }
      } catch(e) {
        console.warn('[CONSENT] localStorage error:', e);
      }
      
      // Listen for consent updates from banner
      window.addEventListener('consent-updated', function(event) {
        const status = event.detail.status === 'accepted' ? 'granted' : 'denied';
        gtag('consent', 'update', {
          'ad_storage': status,
          'analytics_storage': status,
          'ad_user_data': status,
          'ad_personalization': status
        });
        console.log('[CONSENT] Updated:', event.detail.status.toUpperCase());
      }, false);
    </script>
